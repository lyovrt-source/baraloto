<!DOCTYPE html>
<html lang="hy">
<head>

    <title>Բառախաղ v17 - Smart Auto-Stop</title>
    <style>

        #players-container { display: flex; flex-direction: column-reverse; gap: 20px; margin-top: 20px; width: 100%; align-items: center; }
        
        .card { 
            background-color: #000; 
            width: 360px; 
            min-height: 180px; 
            padding: 15px; 
            border-radius: 25px; 
            border: 3px solid #333; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            overflow: hidden; 
            transition: all 0.5s ease;
        }

        .card.winner-glow { border-color: #d4ff00; box-shadow: 0 0 30px #d4ff00; transform: scale(1.02); }

        .mini-letter-circle { position: absolute; bottom: 12px; right: 12px; width: 42px; height: 42px; background-color: #d4ff00; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; z-index: 5; box-shadow: 0 0 10px rgba(212, 255, 0, 0.3); }

        .header { display: flex; align-items: center; margin-bottom: 15px; justify-content: space-between; z-index: 2; }
        
        .player-name { 
            background: white; 
            color: black; 
            padding: 6px 12px; 
            border-radius: 10px; 
            flex-grow: 1; 
            text-align: center; 
            font-weight: bold; 
            margin: 0 10px; 
            outline: none; 
            border: 2px solid transparent; 
            cursor: text;
            user-select: text;
        }
        .player-name:focus { border-color: #d4ff00; }
        
        .icon-btn { cursor: pointer; font-size: 22px; transition: 0.2s; user-select: none; }
        .icon-btn:hover { transform: scale(1.2); }
        
        .row { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: nowrap; justify-content: flex-start; align-items: center; width: 100%; box-sizing: border-box; padding-right: 45px; }
        .box { 
            flex: 1 1 auto; 
            max-width: 38px; 
            aspect-ratio: 1 / 1; 
            background-color: #222; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 18px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #333;
        }

        .box.found { background-color: #4CAF50 !important; color: white !important; transform: scale(1.1); border: none; box-shadow: 0 0 8px #4CAF50; }

        .game-controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        #current-letter { font-size: 90px; color: #d4ff00; font-weight: bold; height: 100px; display: flex; align-items: center; justify-content: center; }
        .pop-animation { animation: letterPop 0.5s ease-out; }
        @keyframes letterPop {
            0% { transform: scale(0); opacity: 0; filter: blur(10px); }
            70% { transform: scale(1.2); opacity: 1; filter: blur(0); }
            100% { transform: scale(1); }
        }

        .btn-group { display: flex; gap: 12px; margin: 20px 0; }
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; padding: 12px 22px; font-size: 16px; transition: 0.2s; }
        
        .alphabet-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; background: #000; padding: 15px; border-radius: 18px; border: 1px solid #333; }
        .alphabet-letter { font-size: 14px; color: #555; text-align: center; font-weight: bold; }
        .letter-used { text-decoration: line-through; color: #ff4d4d; opacity: 0.3; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #winner-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 30px; border-radius: 25px; text-align: center; z-index: 1000; width: 300px; border: 5px solid #d4ff00; }
    </style>

        function splitArmenian(word) {
            let result = [];
            for (let i = 0; i < word.length; i++) {
                if (word[i] === "Ո" && word[i+1] === "Ւ") { result.push("ՈՒ"); i++; } 
                else { result.push(word[i]); }
            }
            return result;
        }

        function getWordsForPlayer() {
            let selectedWords = [];
            let playerUniqueLetters = new Set();
            let attempts = 0;
            while (playerUniqueLetters.size < 15 && attempts < 150) {
                let randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                if (!usedWordsInRound.has(randomWord)) {
                    let wordLetters = splitArmenian(randomWord);
                    let tempSet = new Set(playerUniqueLetters);
                    wordLetters.forEach(l => tempSet.add(l));
                    if (tempSet.size <= 15) {
                        selectedWords.push(randomWord);
                        usedWordsInRound.add(randomWord);
                        wordLetters.forEach(l => { playerUniqueLetters.add(l); globalUsedLetters.add(l); });
                    }
                }
                attempts++;
                if (selectedWords.length >= 4) break;
            }
            if (playerUniqueLetters.size < 15) {
                let shuffled = [...initialAlphabet].sort(() => Math.random() - 0.5);
                for (let l of shuffled) {
                    if (!playerUniqueLetters.has(l)) { selectedWords.push(l); playerUniqueLetters.add(l); }
                    if (playerUniqueLetters.size === 15) break;
                }
            }
            return selectedWords;
        }

        function initAlphabetDisplay() {
            const grid = document.getElementById('alphabet-display');
            grid.innerHTML = '';
            initialAlphabet.forEach(l => {
                const span = document.createElement('div');
                span.className = 'alphabet-letter';
                span.id = `alpha-${l}`;
                span.innerText = l;
                grid.appendChild(span);
            });
        }

        function fillCard(card) {
            const words = getWordsForPlayer();
            card.querySelectorAll('.row').forEach(r => r.remove());
            card.classList.remove('winner-glow');
            words.forEach(word => {
                const row = document.createElement('div');
                row.className = 'row';
                splitArmenian(word).forEach(char => {
                    const box = document.createElement('div');
                    box.className = 'box';
                    box.style.color = colors[Math.floor(Math.random() * colors.length)];
                    box.dataset.letter = char;
                    box.innerText = char;
                    row.appendChild(box);
                });
                card.appendChild(row);
            });
        }

                    <span class="icon-btn refresh">♻️</span>
                    <div class="player-name" contenteditable="true">Խաղացող ${playerCount}</div>
                    <span class="icon-btn" style="color:#ff4d4d" onclick="this.parentElement.parentElement.remove()">✕</span>
                </div>
                <div class="mini-letter-circle">-</div>
            `;
            
            const nameDiv = card.querySelector('.player-name');
            nameDiv.addEventListener('focus', function() {
                const range = document.createRange();
                range.selectNodeContents(this);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });

            card.querySelector('.refresh').onclick = () => fillCard(card);
            fillCard(card);
            document.getElementById('players-container').appendChild(card);
        }

        function pickLetter() {
            if (availableLetters.length === 0) { stopAuto(); return; }
            const index = Math.floor(Math.random() * availableLetters.length);
            const letter = availableLetters.splice(index, 1)[0];
            
            const display = document.getElementById('current-letter');
            display.innerText = letter;
            display.classList.remove('pop-animation');
            void display.offsetWidth;
            display.classList.add('pop-animation');

            document.querySelectorAll('.mini-letter-circle').forEach(circle => circle.innerText = letter);
            const alphaEl = document.getElementById(`alpha-${letter}`);
            if(alphaEl) alphaEl.classList.add('letter-used');

            document.querySelectorAll('.box').forEach(box => {
                if (box.dataset.letter === letter) box.classList.add('found');
            });
            checkWinner();
        }

        function checkWinner() {
            let winners = [];
            let nearWinDetected = false;

            document.querySelectorAll('.card').forEach(player => {
                const boxes = player.querySelectorAll('.box');
                const uniqueToFind = new Set();
                boxes.forEach(b => uniqueToFind.add(b.dataset.letter));
                
                const foundUnique = new Set();
                player.querySelectorAll('.box.found').forEach(b => foundUnique.add(b.dataset.letter));

                // Ստուգում ենք՝ արդյոք մնացել է ճիշտ 1 տառ
                if (uniqueToFind.size - foundUnique.size === 1) {
                    nearWinDetected = true;
                }

                if (uniqueToFind.size > 0 && uniqueToFind.size === foundUnique.size) {
                    winners.push(player.querySelector('.player-name').innerText);
                    player.classList.add('winner-glow');
                }
            });

            // Եթե ինչ-որ մեկին մնացել է 1 տառ, անջատում ենք ավտոն
            if (nearWinDetected && autoInterval) {
                stopAuto();
            }

            if (winners.length > 0) {
                stopAuto();
                document.getElementById('winners-list').innerHTML = winners.join("<br>");
                document.getElementById('overlay').style.display = "block";
                document.getElementById('winner-modal').style.display = "block";
            }
        }

        function stopAuto() {
            clearInterval(autoInterval);
            autoInterval = null;
            document.getElementById('auto-btn').style.boxShadow = "none";
            document.getElementById('auto-btn').style.background = "#fff";
        }

        function closeModal() {
            document.getElementById('overlay').style.display = "none";
            document.getElementById('winner-modal').style.display = "none";
        }

        document.getElementById('letter-btn').onclick = pickLetter;
        document.getElementById('add-btn').onclick = createPlayer;
        document.getElementById('round-btn').onclick = () => {
            availableLetters = [...initialAlphabet];
            usedWordsInRound.clear();
            globalUsedLetters.clear();
            document.getElementById('current-letter').innerText = "-";
            document.querySelectorAll('.mini-letter-circle').forEach(c => c.innerText = "-");
            initAlphabetDisplay();
            document.querySelectorAll('.card').forEach(fillCard);
            stopAuto();
        };

        document.getElementById('auto-btn').onclick = function() {
            if(autoInterval) { 
                stopAuto(); 
            } else { 
                autoInterval = setInterval(pickLetter, 1000); 
                this.style.boxShadow = "0 0 15px #fff"; 
                this.style.background = "#ff4d4d"; // Դառնում է կարմիր, երբ ակտիվ է
            }
        };

        initAlphabetDisplay();
        createPlayer();
    </script>
</body>
</html>
